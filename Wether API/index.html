<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API</title>
    <link rel="stylesheet" href="style.css">


</head>

<body>

    <form id="form">
        <h3>weather update</h3>
        <br>
        <input type="text" name="city" id="input" placeholder="Enter City" required>
        <button type="submit">check</button>

        <div id="container">
            <img src="" alt="" id="img">
            <div class="temp">
                <h1 id="temperature"></h1>
                <h2 id="city"></h2>
            </div>
        </div>

        <div class="box">
            <div class="row">
                <div class="col">
                    <img src="" alt="" id="humidity-img">
                </div>
                <div class="col">
                    <p id="humidity-name"></p>
                    <p id="humidity"></p>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <img src="" alt="" id="speed-img">

                </div>
                <div class="col">
                    <p id="speed-name"></p>
                    <p id="speed"></p>
                </div>
            </div>
        </div>

        <div id="not-found"></div>
    </form>


    <script src="script.js"></script>
</body>

</html>
