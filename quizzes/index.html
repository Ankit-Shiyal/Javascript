<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center flex-wrap " style="height: 100vh;">
        <div class="Quizzes shadow text-center">
            <h1>Quizzes</h1>

            <div class="div d-flex justify-content-between ">

                <div class="div" >
                    <h5 id="qusNumber"></h5>
                </div>
                <div class="div text-danger" id="timer"><h5>30</h5></div>

            </div>

            <div class="question" id="questions">
                <h2>thi is question</h2>
            </div>
            <div class="option " id="options">

                
            </div>


            <button class="btn btn-outline-primary w-100 mt-5 " type="click" id="butSubmit" onclick="nextQuestion()">Next</button>
            <div class="result" id="Quizzes-result"></div>

        </div>

        


    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
