<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


        <style>
            .container-fluid{
                height: 100vh;
            }
            .shadow{
                width: 500px;
                height: 400px;
            }


             #QnsOption{
                display: flex;
                flex-wrap: wrap;
             }
            #QnsOption button{
                width: 80%;
                margin: 10px;

            }
        </style>

    </head>

<body>



    <div class="container-fluid d-flex justify-content-center align-items-center ">
        <div class="shadow text-center">
            <h1>Quiz Application</h1>
        

        <div class=" justify-content-between d-flex">
            <div class="div" id="QnsNum">1/10</div>
            <div class="div" id="timer">30</div>
        </div>
        <div class="div" id="Question">
            <h1>this is question</h1>
        </div>
        <div class="div" id="QnsOption"></div>

        <button class="btn btn-outline-primary w-75" id="nextBtn" onclick="nextQns()">Next</button>
        <div class="div" id="result"></div>

    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="script.js"></script>
</body>

</html>
