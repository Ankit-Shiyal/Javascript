<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


        <style>
           * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.shadow {
    margin-top: 50px;
    width: 500px;
    max-width: 95%;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align: center;
}

.shadow h1 {
    margin-bottom: 10px;
    font-weight: 600;
}

.div {
    margin-bottom: 10px;
}

#timer {
    font-weight: bold;
    color: #ff4d4d;
}

#Question h1 {
    margin: 20px 0;
    font-size: 20px;
    font-weight: 500;
}

#QnsOption {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
}

#QnsOption .col-md-6 {
    width: 48%;
}

.option-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
    font-weight: 500;
    transition: 0.3s;
}

#QnsOption button{
    margin-top: 10px;
}

.option-btn:hover {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

#nextBtn {
    margin-top: 20px;
    padding: 12px;
    border-radius: 12px;
    font-weight: 600;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    color: white;
    transition: 0.3s;
}

#nextBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

.answer-qus {
    border-radius: 12px;
    padding: 10px;
}

.list-group-item {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    margin-bottom: 10px;
    border-radius: 10px;
}
        </style>

    </head>

<body>



    <div class="container-fluid d-flex justify-content-center align-items-center ">
        <div class="shadow text-center">
            <h1>Quiz Application</h1>
        

        <div class=" justify-content-between d-flex">
            <div class="div" id="QnsNum">1/10</div>
            <div class="div" id="timer">30</div>
        </div>
        <div class="div" id="Question">
            <h1>this is question</h1>
        </div>
        <div class="div" id="QnsOption"></div>

        <button class="btn btn-outline-primary w-75" id="nextBtn" onclick="nextQns()">Next</button>
        <div class="div" id="result"></div>

    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="script.js"></script>
</body>

</html>
