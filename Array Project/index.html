<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Array project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

     <link rel="stylesheet" href="style.css"> 

</head>

<body>

    <div class="container mt-5">
        <div class="shadow p-4 text-center">

            <h3 class="mb-3">enter number</h3>



            <input type="text" class=" mb-3" placeholder="Enter value" id="arrayNum">
            <button id="start" class="btn btn-primary" onclick="startNum()">start</button>



            <div class="justify-content-center d-flex flex-wrap" id="itemArray"></div>

            <button class="btn btn-outline-primary m-2" id="showArray" onclick="getArrayValues()">create Array</button>


            <div class="mt-2">
                <p id="createArray"></p>
            </div>

            <div class="div">  

                <input type="text" id="pushInput" placeholder="Enter value" style="display:none;">
                <button id="addBtn" style="display:none;">Add</button>

                <button class="btn btn-primary" id="pushBtn">
                    Push
                </button>

                <button class="btn btn-primary" id="popBtn">
                    Pop
                </button>

                <button class="btn btn-primary" id="shiftBtn">
                    Shift
                </button>


                <input type="text" id="unshiftInput" placeholder="Enter value" style="display:none;">
                <button id="unshiftAddBtn" style="display:none;">Add First</button>

                <button class="btn btn-primary" id="unshiftBtn">
                    Unshift
                </button>

                 <button class="btn btn-primary" id="jointBtn">
                    Join
                </button>


            </div>

            <div class="mt-4">
                <h5>Output:</h5>
                <p id="output"></p>
            </div>


        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>

</body>

</html>
