<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Numbers</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: linear-gradient(45deg, #e1ff9a, #e5461a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    form {
      background: white;
      padding: 20px 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    #result {
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <form id="form">

    <h3>Show Prime Numbers</h3>

    <label>Enter Number:</label>
    <input type="number" id="num" required>

    <button type="submit">Show Prime Numbers</button>

    <h3 id="result"></h3>

  </form>

  <script src="script.js"></script>

</body>

</html>
