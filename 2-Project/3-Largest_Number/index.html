<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: linear-gradient(45deg, #9abcff, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        form {
            background: white;
            padding: 25px 35px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 320px;
        }

        h3 {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #45a049;
        }

        #result {
            margin-top: 15px;
            color: #333;
        }
    </style>
</head>

<body>

    <form id="form">

        <h3>Find Largest Number</h3>

        <input type="number" id="n1" placeholder="Enter number 1" required>
        <input type="number" id="n2" placeholder="Enter number 2" required>
        <input type="number" id="n3" placeholder="Enter number 3" required>
        <input type="number" id="n4" placeholder="Enter number 4" required>
        <input type="number" id="n5" placeholder="Enter number 5" required>

        <button type="submit">Find Largest Number</button>

        <h3 id="result"></h3>

    </form>

    <script src="script.js"></script>

</body>

</html>
