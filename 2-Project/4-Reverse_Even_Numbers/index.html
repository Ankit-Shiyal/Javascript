<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reverse Even Numbers</title>

<style>

body{
font-family: Arial, sans-serif;
background-image: linear-gradient(45deg,#9aff9a,#fcbba9);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

form{
background:white;
padding:25px 35px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
width:320px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#45a049;
}

#result{
margin-top:15px;
}

</style>

</head>

<body>

<form id="form">

<h3>Reverse Even Numbers</h3>

<input type="number" id="num" placeholder="Enter a number" required>

<button type="submit">Show Reverse Even Numbers</button>

<h3 id="result"></h3>

</form>

<script src="script.js"></script>

</body>

</html>
