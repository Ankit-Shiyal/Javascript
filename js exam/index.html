<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">



    <style>
        body {
            background: #EEAECA;
            background: radial-gradient(circle, rgba(238, 174, 202, 1) 0%, rgba(148, 187, 233, 1) 100%);
        }
        .shadow{
            border-radius: 10px;
        }

    </style>

</head>

<body>

    <div class="container-fluid d-flex justify-content-center align-items-center " style="height: 100vh;">


        <div class="shadow p-4 bg-white w-50  text-center">
            <h1 class="fst-italic">Task Manager</h1>

            <div class="mt-3">

                <form action="" id="form">

                
                    <input type="text" class="form-control" placeholder=" Enter Task" id="taskInput">
                    <br>

                    <input type="text" class="form-control" placeholder="Enter your task Description" id="disInput">
                    <br>

                    <input type="date" class="form-control" id="DateInput">

                    <br>

                    <button class="btn btn-outline-primary w-100" id="SubmitForm" type="submit"> Add task</button>

                </form>

                <table class="table table-bordered mt-3">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Task</th>
                            <th>Description</th>
                            <th>Date</th>
                            <th>Edit</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody id="result"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>

</body>

</html>
